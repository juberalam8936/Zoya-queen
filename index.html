<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queen Zoya 👑</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#000,#ff4da6);
 color:white;
 text-align:center;
 overflow:hidden;
}

/* screens /
.screen{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}
.hide{display:none}

/ button glow /
button{
 padding:15px 30px;
 font-size:18px;
 border:none;
 border-radius:30px;
 background:gold;
 animation:glow 1.2s infinite alternate;
}
@keyframes glow{
 from{box-shadow:0 0 10px gold}
 to{box-shadow:0 0 40px pink}
}

/ image /
.img-box{position:relative;}
.img-box img{
 width:260px;
 border-radius:20px;
}

/ crown /
.crown{
 position:absolute;
 width:100px;
 left:50%;
 transform:translateX(-50%);
 top:-120px;
 animation:drop 1s ease forwards;
}
@keyframes drop{
 to{top:-40px}
}

/ scratch /
#c{touch-action:none}

/ hearts /
.heart{
 position:absolute;
 font-size:20px;
 animation:rise 5s linear infinite;
}
@keyframes rise{
 from{transform:translateY(0)}
 to{transform:translateY(-900px)}
}

/ confetti /
.confetti{
 position:absolute;
 width:6px;
 height:6px;
 animation:fall 3s linear infinite;
}
@keyframes fall{
 from{transform:translateY(-50px)}
 to{transform:translateY(800px)}
}

/ flash /
.flash{
 position:fixed;
 width:100%;
 height:100%;
 background:white;
 top:0;
 left:0;
 opacity:0;
 pointer-events:none;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<!-- start -->
<div id="start" class="screen">
<h1>🎁 Surprise Gift</h1>
<button onclick="start()">Open Gift 💖</button>
</div>

<!-- scratch -->
<div id="scratch" class="screen hide">
<h2>Scratch karo 👇</h2>
<canvas id="c" width="300" height="200"></canvas>
</div>

<!-- final -->
<div id="final" class="screen hide">

<h1>👑 Miss Zoya 👑</h1>

<div class="img-box">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<img class="crown" src="https://cdn-icons-png.flaticon.com/512/616/616554.png">
</div>

<h2>🎉 10,000 Followers 🎉</h2>

<p id="text"></p>

<h3>💝 By Juber 💝</h3>

</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

function start(){
 document.getElementById("start").classList.add("hide");
 document.getElementById("scratch").classList.remove("hide");
 initScratch();
}

// SCRATCH
function initScratch(){
 let c=document.getElementById("c");
 let ctx=c.getContext("2d");

 ctx.fillStyle="gray";
 ctx.fillRect(0,0,300,200);

 let drawing=false;

 function draw(e){
  if(!drawing)return;
  let r=c.getBoundingClientRect();
  let x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  let y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;

  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath();
  ctx.arc(x,y,25,0,Math.PI2);
  ctx.fill();
  check();
 }

 c.onmousedown=()=>drawing=true;
 c.onmouseup=()=>drawing=false;
 c.onmousemove=draw;

 c.ontouchstart=(e)=>{drawing=true;e.preventDefault()}
 c.ontouchend=(e)=>{drawing=false;e.preventDefault()}
 c.ontouchmove=(e)=>{draw(e);e.preventDefault()}

 function check(){
  let p=ctx.getImageData(0,0,300,200).data;
  let count=0;
  for(let i=0;i<p.length;i+=4){
   if(p[i+3]==0)count++;
  }
  if(count>p.length/5){
   showFinal();
  }
 }
}

// FINAL SHOW
function showFinal(){

 // flash
 let f=document.getElementById("flash");
 f.style.opacity="1";
 setTimeout(()=>{f.style.opacity="0"},200);

 document.getElementById("scratch").classList.add("hide");
 document.getElementById("final").classList.remove("hide");

 document.getElementById("music").play();

 // typing shayri
 let arr=[
 "Teri muskaan meri jaan hai 💖",
 "10K nahi tera magic hai 👑",
 "Tu hi meri queen hai ❤️",
 "Har follower ke saath mera pyaar badhta hai 💞"
 ];
 let i=0,j=0;

 function type(){
  let t=arr[i];
  document.getElementById("text").innerHTML=t.substring(0,j++);
  if(j>t.length){
   j=0;
   i=(i+1)%arr.length;
  }
  setTimeout(type,80);
 }
 type();

 // hearts
 for(let i=0;i<40;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
 }

 // confetti
 for(let i=0;i<60;i++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"%";
  c.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)];
  document.body.appendChild(c);
 }

}

</script>

</body>
</html>
